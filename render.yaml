services:
  # Laravel Web Service
  - type: web
    name: laravel-app
    env: docker
    dockerfile: Dockerfile
    plan: free # অথবা আপনার পছন্দমতো প্ল্যান
    region: singapore # আপনার কাছের রিজিয়ন
    envVars:
      - key: APP_KEY
        sync: false # এটি Render ড্যাশবোর্ডে ম্যানুয়ালি সেট করবেন
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: laravel-db
          property: connectionString

# Render Managed PostgreSQL Database
databases:
  - name: laravel-db
    databaseName: laravel
    user: laravel_user
    plan: free
    region: singapore
